<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المنيو</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>لوحة تحكم الإدارة ⚙️</h1>
        <a href="index.html" class="back-link">العودة للمنيو</a>
    </header>

    <main>
        <section class="admin-panel">
            <h2>إضافة وجبة جديدة</h2>
            <input type="text" id="itemName" placeholder="اسم الوجبة (مثال: برجر لحم)">
            <input type="number" id="itemPrice" placeholder="السعر">
            <button id="addItemBtn">إضافة للقائمة</button>
        </section>

        <section>
            <h2>الوجبات الحالية</h2>
            <div id="admin-menu-container" class="menu-grid"></div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
