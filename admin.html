<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المطورة</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تحسين مظهر أزرار رفع الملفات لتناسب الموبايل */
        label {
            display: block;
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            font-size: 10.5pt;
            color: #555;
        }
        input[type="file"] {
            background: #f8f9fa;
            border: 1px dashed #ff4757;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚙️ لوحة إدارة النظام الديناميكي</h1>
        <a href="index.html" class="back-link">📊 استعراض المنيو الرئيسي</a>
    </header>

    <main class="admin-main">
        <section class="admin-card">
            <h2>🏠 إعدادات المطعم والتواصل</h2>
            <label>اسم المطعم:</label>
            <input type="text" id="setRestName" placeholder="اكتب اسم المطعم">
            
            <label>اختر صورة/شعار المطعم من جهازك:</label>
            <input type="file" id="setRestLogo" accept="image/*">
            
            <label>رقم الواتساب للتوصيل (مثال: 9647700000000):</label>
            <input type="text" id="setWhatsApp" placeholder="رقم الواتساب بدون علامة +">
            
            <label>رابط انستقرام المباشر:</label>
            <input type="text" id="setInstagram" placeholder="رابط المحادثة">
            <button id="saveConfigBtn" class="btn-primary">حفظ إعدادات المطعم</button>
        </section>

        <section class="admin-card">
            <h2>🔥 إضافة عرض أو إعلان جديد (الشريط المتحرك)</h2>
            <label>عنوان العرض (مثال: خصم 25%):</label>
            <input type="text" id="offerTitle" placeholder="اكتب تفاصيل العرض">
            
            <label>اختر صورة العرض المستطيلة من جهازك:</label>
            <input type="file" id="offerImage" accept="image/*">
            <button id="addOfferBtn" class="btn-secondary">إضافة العرض للشريط</button>
            
            <h3>العروض الحالية (اضغط للحذف):</h3>
            <div id="admin-offers-list" class="admin-list"></div>
        </section>

        <section class="admin-card">
            <h2>🍔 إضافة وجبة جديدة للمنيو</h2>
            <label>اسم الوجبة:</label>
            <input type="text" id="itemName" placeholder="مثال: برجر لحم دبل">
            
            <label>السعر بالدينار العراقي:</label>
            <input type="number" id="itemPrice" placeholder="السعر">
            
            <label>اختر صورة الوجبة من جهازك:</label>
            <input type="file" id="itemImage" accept="image/*">
            <button id="addItemBtn" class="btn-primary">إضافة الوجبة للمنيو</button>
            
            <h3>الوجبات الحالية في المنيو:</h3>
            <div id="admin-menu-container" class="menu-grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
